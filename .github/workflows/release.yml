name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist; e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  BINARY_NAME: flow
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Both arches are cross-compiled from a single Apple Silicon runner.
          # Building x86_64 natively on `macos-13` works, but those runners are
          # being deprecated and queue times have become multi-hour.
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-apple-darwin
            runner: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}

      - name: Package tarball
        id: package
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          ARCHIVE="${BINARY_NAME}-${{ matrix.target }}.tar.gz"
          tar -czf "${ARCHIVE}" \
            -C "target/${{ matrix.target }}/release" "${BINARY_NAME}"
          shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          echo "archive=${ARCHIVE}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Upload artifact (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.archive }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
          retention-days: 7

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package.outputs.tag }}
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true

  publish-crate:
    name: publish flowctl to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify Cargo.toml version matches the tag
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          CARGO_VERSION=$(awk -F'"' '/^version[[:space:]]*=/ {print $2; exit}' Cargo.toml)
          if [ "${VERSION}" != "${CARGO_VERSION}" ]; then
            echo "::error::tag ${TAG} implies version ${VERSION}, but Cargo.toml has ${CARGO_VERSION}"
            exit 1
          fi
          echo "publishing flowctl ${CARGO_VERSION}"

      - name: Skip if already published
        id: skip
        run: |
          set -euo pipefail
          CARGO_VERSION=$(awk -F'"' '/^version[[:space:]]*=/ {print $2; exit}' Cargo.toml)
          # `cargo search` returns the latest published version on a single line.
          PUBLISHED=$(cargo search flowctl --limit 1 \
            | awk -F'"' '/^flowctl/ {print $2; exit}')
          if [ "${PUBLISHED}" = "${CARGO_VERSION}" ]; then
            echo "flowctl ${CARGO_VERSION} is already published; skipping."
            echo "skip=true" >> "${GITHUB_OUTPUT}"
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish flowctl
        if: steps.skip.outputs.skip != 'true'
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
